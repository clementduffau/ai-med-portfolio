services:
  api:
    build: .
    container_name: mcp-ai-research-assistant-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    container_name: mcp-ai-research-assistant-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
  huggingface_cache: